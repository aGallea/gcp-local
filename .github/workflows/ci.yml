name: ci

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  # release-please creates the v* tag using GITHUB_TOKEN, which by design
  # cannot trigger other workflows (recursion guard). It also publishes a
  # GitHub Release — that DOES trigger downstream workflows. Listen here
  # so publish-image fires on a release-please-driven release without
  # needing a manual tag re-push.
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy
      - run: pytest tests/unit -v

  integration:
    runs-on: ubuntu-latest
    needs: lint-type-unit
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/integration -v -k "not docker"

  docker:
    runs-on: ubuntu-latest
    needs: lint-type-unit
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker build -f docker/Dockerfile -t gcp-local:dev .
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/integration/test_docker_image.py -v

  publish-image:
    # Publishes a multi-arch image to GitHub Container Registry. Runs on:
    #   - push to master      → :latest + :master-<sha>
    #   - push to v* tag      → :vX.Y.Z + :vX.Y (manual tag pushes only)
    #   - release: published  → :vX.Y.Z + :vX.Y (release-please path; the v*
    #                           tag it creates with GITHUB_TOKEN can't trigger
    #                           push events on its own, but the published
    #                           release does)
    # Skips PR runs (no credentials, no point).
    # Depends on `docker` so we only publish images that passed the smoke test.
    runs-on: ubuntu-latest
    needs: [docker, integration]
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/gcp-local
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=master-,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
