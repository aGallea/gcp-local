name: ci

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web
      - run: npm test
        working-directory: web
      - run: npm run build
        working-directory: web
      - name: Verify the committed bundle matches the source
        # If `npm run build` produced a diff against the committed
        # src/gcp_local/ui/static, the contributor forgot to rebuild.
        run: |
          if ! git diff --quiet src/gcp_local/ui/static; then
            echo "::error::web bundle is stale. Run 'cd web && npm run build' and commit."
            git diff --stat src/gcp_local/ui/static
            exit 1
          fi

  lint-type-unit:
    runs-on: ubuntu-latest
    needs: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy
      - run: pytest tests/unit -v

  integration:
    runs-on: ubuntu-latest
    needs: lint-type-unit
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/integration -v -k "not docker"

  docker:
    runs-on: ubuntu-latest
    needs: lint-type-unit
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        run: docker build -f docker/Dockerfile -t gcp-local:dev .
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/integration/test_docker_image.py -v

  publish-image:
    # Publishes a multi-arch image to GitHub Container Registry. Skips PR runs
    # (no credentials, no point); runs on master pushes and on `v*` tag pushes.
    # Depends on `docker` so we only publish images that passed the smoke test.
    runs-on: ubuntu-latest
    needs: [docker, integration]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/gcp-local
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=master-,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
